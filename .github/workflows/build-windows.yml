name: Build Windows Installer
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: '1.0.7'
jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(cat shared/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Build installers
        shell: pwsh
        run: ./windows/build-windows-installer.ps1 -Version "${{ steps.ver.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ steps.ver.outputs.version }}
          path: "Aura-Desktop-Installer-v*.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi-${{ steps.ver.outputs.version }}
          path: "Aura.Desktop_*_x64_en-US.msi"
          if-no-files-found: warn
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            Aura-Desktop-Installer-v*.exe
            Aura.Desktop_*_x64_en-US.msi
            windows/setup-ollama.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
